
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello-world
          image: hello-world-spring:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: hello-world-config
            - secretRef:
                name: hello-world-secret
